<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arquivar</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    :root { --azul:#0f6cbd; }
    * { box-sizing:border-box; }
    body { font-family:-apple-system,"Segoe UI",Roboto,sans-serif; margin:0; padding:16px; color:#242424; }
    header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    header .dot { width:28px; height:28px; border-radius:7px; background:var(--azul); }
    h1 { font-size:16px; margin:0; font-weight:600; }
    #status { font-size:13px; padding:9px 11px; border-radius:7px; background:#f3f6fb; margin-bottom:14px; }
    #content { font-size:14px; line-height:1.4; }
    .muted { color:#616161; }
  </style>
</head>
<body>
  <header>
    <div class="dot"></div>
    <h1>Arquivar</h1>
  </header>
  <div id="status">A carregar…</div>
  <div id="content" class="muted">—</div>
  <script src="taskpane.js"></script>
</body>
</html>
