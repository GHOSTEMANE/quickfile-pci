<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arquivar</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <script src="vendor/msal-browser.min.js"></script>
  <style>
    :root {
      --azul:#0f6cbd;
      --bg:#ffffff;
      --fg:#242424;
      --muted:#6b6b6b;
      --panel:#f3f6fb;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#1f1f1f; --fg:#f3f3f3; --muted:#b8b8b8; --panel:#2b2b2b; }
    }
    * { box-sizing:border-box; }
    body { font-family:-apple-system,"Segoe UI",Roboto,sans-serif; margin:0; padding:16px;
           color:var(--fg); background:var(--bg); }
    header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    header .dot { width:28px; height:28px; border-radius:7px; background:var(--azul); flex:none; }
    h1 { font-size:16px; margin:0; font-weight:600; color:var(--fg); }
    #status { font-size:13px; padding:10px 12px; border-radius:8px; background:var(--panel);
              color:var(--fg); margin-bottom:12px; }
    button { font:inherit; font-size:14px; font-weight:600; color:#fff; background:var(--azul);
             border:0; border-radius:8px; padding:11px 14px; cursor:pointer; width:100%; }
    button:hover { filter:brightness(1.08); }
    #content { font-size:13px; line-height:1.5; margin-top:12px; color:var(--fg); }
    #content.muted { color:var(--muted); }
    #content ul { margin:0; padding:0; list-style:none; }
    #content li { padding:7px 10px; border-radius:6px; display:flex; justify-content:space-between; gap:10px; }
    #content li:nth-child(odd) { background:var(--panel); }
    #content li .cnt { color:var(--muted); font-variant-numeric:tabular-nums; }
    .err { color:#e25563; white-space:pre-wrap; word-break:break-word; }
  </style>
</head>
<body>
  <header>
    <div class="dot"></div>
    <h1>Arquivar</h1>
  </header>
  <div id="status">A carregar…</div>
  <button id="btnPastas">Ver as minhas pastas</button>
  <div id="content" class="muted">—</div>
  <script src="taskpane.js"></script>
</body>
</html>
