<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Arquivar</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <script src="vendor/msal-browser.min.js"></script>
  <style>
    html, body { margin:0; background:#1e1e1e; color:#fff;
      font-family:-apple-system,"Segoe UI",Roboto,sans-serif; }
    body { padding:14px 16px 24px; font-size:14px; -webkit-font-smoothing:antialiased; }
    h1 { font-size:15px; margin:0 0 12px; font-weight:600; }

    .card { background:#2a2a2a; border:1px solid #3a3a3a; border-radius:10px; padding:11px 13px; margin-bottom:10px; }
    .card .assunto { font-weight:600; line-height:1.35; word-break:break-word; }
    .card .de { color:#9aa0a6; font-size:12px; margin-top:3px; }
    .card.vazio { color:#9aa0a6; font-weight:400; }

    #status { font-size:12.5px; color:#cfcfcf; margin:0 2px 10px; min-height:15px; }
    #status.ok { color:#5fd08a; }
    #status.err { color:#ff8a8a; white-space:pre-wrap; word-break:break-word; }

    #busca { width:100%; box-sizing:border-box; background:#2a2a2a; color:#fff;
      border:1px solid #3a3a3a; border-radius:8px; padding:9px 11px; font:inherit; font-size:13px; margin-bottom:10px; }
    #busca::placeholder { color:#8a8a8a; }
    #busca:focus { outline:none; border-color:#2b88d8; }

    .seclabel { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:#8a8a8a; margin:6px 2px 5px; }

    ul { list-style:none; margin:0; padding:0; }
    li { display:flex; align-items:center; gap:6px; padding:8px 8px; border-radius:8px; cursor:pointer; border:1px solid transparent; }
    li:hover { background:#2f6ea8; border-color:#3f86c9; }
    li .seta { flex:none; width:18px; text-align:center; color:#cfcfcf; user-select:none; font-size:12px; cursor:pointer; }
    li .seta:hover { color:#fff; }
    li .seta.vazia { visibility:hidden; }
    li .nome { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    li .cnt { color:#9aa0a6; font-variant-numeric:tabular-nums; font-size:12px; flex:none; }
    li:hover .cnt { color:#dfe9f5; }
    li .copy { flex:none; opacity:.5; font-size:14px; padding:1px 4px; border-radius:4px; }
    li .copy:hover { opacity:1; background:rgba(255,255,255,.16); }
    li .cam { color:#8a8a8a; font-size:11px; } /* caminho na procura */

    #sugerido li.sug { background:#1c3b57; border-color:#2b88d8; }
    #sugerido li.sug .nome::before { content:"⭐ "; }
    #sugerido li.sug:hover { background:#2f6ea8; }

    li.criar { background:#1f3b2a; border-color:#2f7d4f; }
    li.criar .nome { color:#7ee2a3; }
    li.criar:hover { background:#2f7d4f; }
    li.criar:hover .nome { color:#fff; }
    .inp-sub { flex:1; background:#1e1e1e; color:#fff; border:1px solid #2b88d8; border-radius:6px; padding:5px 8px; font:inherit; font-size:13px; }
    .inp-sub:focus { outline:none; }

    button { width:100%; background:#2b88d8; color:#fff; border:0; border-radius:8px;
      padding:11px 14px; font:inherit; font-weight:600; cursor:pointer; margin-top:6px; }
    button:hover { filter:brightness(1.08); }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <h1>📥&nbsp; Arquivar</h1>

  <div id="email" class="card vazio">A carregar…</div>
  <div id="status"></div>

  <input id="busca" class="hidden" type="text" placeholder="Procurar pasta — ou escrever uma nova…" autocomplete="off" />

  <div id="sugWrap" class="hidden">
    <div class="seclabel">Sugerida</div>
    <ul id="sugerido"></ul>
    <div class="seclabel">Todas as pastas</div>
  </div>

  <ul id="lista"></ul>
  <button id="btnLogin" class="hidden">Iniciar sessão</button>

  <script src="app.js?v=14"></script>
</body>
</html>
