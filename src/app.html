<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arquivar</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <script src="vendor/msal-browser.min.js"></script>
  <style>
    html, body { margin:0; background:#1e1e1e; color:#ffffff;
      font-family:-apple-system,"Segoe UI",Roboto,sans-serif; }
    body { padding:16px; font-size:14px; -webkit-font-smoothing:antialiased; }
    h1 { font-size:16px; margin:0 0 14px; font-weight:600; }
    #status { background:#2c2c2c; border:1px solid #3a3a3a; border-radius:8px;
      padding:10px 12px; font-size:13px; margin-bottom:12px; color:#ffffff; }
    button { width:100%; background:#2b88d8; color:#ffffff; border:0; border-radius:8px;
      padding:11px 14px; font:inherit; font-weight:600; cursor:pointer; }
    button:hover { filter:brightness(1.08); }
    ul { list-style:none; margin:14px 0 0; padding:0; }
    li { display:flex; justify-content:space-between; gap:10px; align-items:center;
      padding:9px 4px; border-bottom:1px solid #3a3a3a; font-size:13px; color:#ffffff; }
    li .cnt { color:#9aa0a6; font-variant-numeric:tabular-nums; }
    .err { color:#ff8a8a; white-space:pre-wrap; word-break:break-word; }
  </style>
</head>
<body>
  <h1>📥&nbsp; Arquivar</h1>
  <div id="status">A carregar…</div>
  <button id="btnPastas">Ver as minhas pastas</button>
  <div id="content"></div>
  <script src="app.js"></script>
</body>
</html>
